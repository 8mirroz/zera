[project]
name = "antigravity-agent-os"
version = "0.2.0"
description = "Agent OS runtime contracts, routing, and validation utilities"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "PyYAML>=6.0,<7.0",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
