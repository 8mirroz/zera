id: brief-to-system-design
name: Project Brief to System Design
version: 1.0.0
entry_agent: architecture-systems-architect
stages:
  - id: component-design
    agent: architecture-systems-architect
    outputs: [component_diagram, api_specs]
  - id: config-generation
    agent: architecture-config-designer
    outputs: [docker_compose, env_template]
  - id: architecture-review
    agent: review-critic
    outputs: [design_approval_matrix]
completion_criteria:
  - "Component diagrams and APIs are documented"
  - "Base configurations are generated"
  - "Architecture has passed the critical review gate"
