$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Registry Task Handoff Contract"
type: object
additionalProperties: true
required:
  - objective
  - evidence
  - open_risks
  - next_owner
  - completion_target
properties:
  objective:
    type: string
    minLength: 1
  evidence:
    type: array
    minItems: 1
    items:
      anyOf:
        - type: string
          minLength: 1
        - type: object
  open_risks:
    type: array
    items:
      anyOf:
        - type: string
        - type: object
  next_owner:
    type: string
    minLength: 1
  completion_target:
    type: string
    minLength: 1
