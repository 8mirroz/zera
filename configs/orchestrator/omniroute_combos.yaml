      - model: "cl/openai/o3"
        reason: "O3 — strong reasoning for complex architectural decisions"
      - model: "kc/qwen/qwen3-235b-a22b-thinking-2507"
        reason: "Qwen3 235B Thinking — large model for deep reasoning"

  # --- Council (C4-C5) ---
  # Needs: highest judgment, multi-option analysis, strategic thinking
  # Priority: maximum reasoning capability, reliability
  council:
    role: "council"
    description: "Multi-role arbitration and strategic escalation"
    strategy: "priority"
    models:
      - model: "ollama/deepseek-r1:7b"
        reason: "Local DeepSeek R1 7B — highest available local reasoning for arbitration"
      - model: "antigravity/claude-opus-4-6-thinking"
        reason: "Claude Opus Thinking — top tier for strategic judgment"
      - model: "gh/claude-opus-4.6"
