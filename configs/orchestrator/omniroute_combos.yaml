# OmniRoute Combos — Version-Controlled Configuration
# Version: 4.3 — Live Model Sync
# Generated: 2026-04-14
# Source of truth for role→model fallback chains.
# Sync to OmniRoute via: python3 scripts/omniroute/sync_combos.py
# OmniRoute API: http://localhost:20128/v1
#
# Models verified against live OmniRoute instance (187 models available).

# Global settings
omniroute:
  base_url: "http://localhost:20128/v1"
  api_key: "${OMNIRROUTE_API_KEY:-}"  # Optional — set if OmniRoute has auth
  sync_strategy: "upsert"  # upsert | replace | dry-run

# Default routing settings
defaults:
  strategy: "priority"  # Strict sequential fallback
  timeout_seconds: 60
  max_retries: 3
  circuit_breaker_threshold: 5  # failures before marking model unhealthy

# ============================================================================
# Role-Specific Combos
# Each combo maps to a role contract in configs/orchestrator/role_contracts/
# Models verified against live OmniRoute instance.
# ============================================================================

combos:

  # --- Orchestrator (C1-C5) ---
  # Needs: task classification, routing decisions, coordination
  # Best: balanced general reasoning, good instruction following
  orchestrator:
    role: "orchestrator"
    description: "Task classification and swarm coordination"
    strategy: "priority"
    models:
      - model: "kc/openrouter/auto"
        reason: "KiloCode OR Free Auto — primary free remote orchestrator"
      - model: "lmstudio/google/gemma-4-e2b"
        reason: "Local Gemma 4 E2B — sovereign local fallback"

  # --- Routine Worker (C1-C2) ---
  # Needs: fast, cheap, deterministic execution
  # Priority: speed + cost efficiency
  routine_worker:
    role: "routine_worker"
    description: "Low-complexity deterministic execution"
    strategy: "priority"
    models:
      - model: "kc/openrouter/auto"
        reason: "KiloCode OR Free Auto — fast free routine execution"
      - model: "lmstudio/google/gemma-4-e2b"
        reason: "Local Gemma 4 E2B — fast local fallback"

  # --- Engineer (C2-C4) ---
  # Needs: code generation, refactoring, implementation
  # Priority: coding quality, context window, test awareness
  engineer:
    role: "engineer"
    description: "Code implementation and refactoring"
    strategy: "priority"
    models:
      - model: "kc/openrouter/auto"
        reason: "KiloCode OR Free Auto — primary free coding engine"
      - model: "lmstudio/google/gemma-4-e2b"
        reason: "Local Gemma 4 E2B — sovereign local coding fallback"

  # --- Design Lead (C2-C4) ---
  # Needs: visual judgment, design system knowledge, UX reasoning
  # Priority: large context, visual understanding, aesthetic coherence
  design_lead:
    role: "design_lead"
    description: "UX and visual governance"
    strategy: "priority"
    models:
      - model: "lmstudio/google/gemma-4-e2b"
        reason: "Local Gemma 4 E2B — primary local design/vision"
      - model: "antigravity/gemini-3-flash"
        reason: "Gemini 3 Flash — fast vision iteration"
      - model: "antigravity/gemini-3.1-pro-high"
        reason: "Gemini 3.1 Pro High — premium visual/UX reasoning"

  # --- Reviewer (C1-C5) ---
  # Needs: defect detection, contract compliance, adversarial thinking
  # Priority: thoroughness, large context, code analysis
  reviewer:
    role: "reviewer"
    description: "Independent validation and critique"
    strategy: "priority"
    models:
      - model: "lmstudio/google/gemma-4-e2b"
        reason: "Local Gemma 4 E2B — only approved local model"
      - model: "cl/anthropic/claude-opus-4-20250514"
        reason: "Claude Opus — premium audit for critical safety/security"
      - model: "cl/openai/o3"
        reason: "O3 — premium adversarial reasoning"

  # --- Architect (C3-C5) ---
  # Needs: deep reasoning, system design, tradeoff analysis
  # Priority: reasoning depth, architectural pattern recognition
  architect:
    role: "architect"
    description: "System design and governance authority"
    strategy: "priority"
    models:
      - model: "lmstudio/google/gemma-4-e2b"
        reason: "Local Gemma 4 E2B — only approved local model"
      - model: "cl/anthropic/claude-opus-4-20250514"
        reason: "Claude Opus — premium authority for complex system design"
      - model: "cl/google/gemini-2.5-pro"
        reason: "Gemini 2.5 Pro — tradeoff analysis premium"

  # --- Council (C4-C5) ---
  # Needs: highest judgment, multi-option analysis, strategic thinking
  # Priority: maximum reasoning capability, reliability
  council:
    role: "council"
    description: "Multi-role arbitration and strategic escalation"
    strategy: "priority"
    models:
      - model: "lmstudio/google/gemma-4-e2b"
        reason: "Local Gemma 4 E2B — only approved local model"
      - model: "antigravity/claude-opus-4-6-thinking"
        reason: "Claude Opus Thinking — absolute strategic authority"
      - model: "cl/openai/o3"
        reason: "O3 — premium analytical arbitration"

# ============================================================================
# Shared Utility Combos (used by system, not roles)
# ============================================================================

utility_combos:

  # Quick tasks — low latency, cheap
  quick_task:
    description: "Fast responses for trivial queries"
    strategy: "priority"
    models:
      - model: "lmstudio/google/gemma-4-e2b"
        reason: "Local Gemma 4 E2B — only approved local model"

  # Heavy analysis — maximum reasoning
  heavy_analysis:
    description: "Complex analytical tasks requiring deep reasoning"
    strategy: "priority"
    models:
      - model: "antigravity/claude-opus-4-6-thinking"
      - model: "cl/anthropic/claude-opus-4-20250514"
      - model: "cl/openai/o3"

  # Embedding generation
  embedding:
    description: "Vector embedding generation for memory/retrieval"
    strategy: "priority"
    models:
      - model: "lmstudio/text-embedding-nomic-embed-text-v1.5"
        reason: "Local Nomic Embed — primary local embedding engine"
      - model: "cl/openai/text-embedding-3-large"
        reason: "Premium Embedding Fallback (Direct API)"

  # Image generation
  image_gen:
    description: "Image generation for design and prototyping"
    strategy: "priority"
    models:
      - model: "cl/openai/dall-e-3"
        reason: "DALL-E 3 — primary premium image gen"
      - model: "antigravity/google-imagen-3-premium"
