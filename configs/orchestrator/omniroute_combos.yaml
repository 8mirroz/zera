# ============================================================================
# Shared Utility Combos (used by system, not roles)
# ============================================================================

utility_combos:

  # Quick tasks — low latency, cheap
  quick_task:
    description: "Fast responses for trivial queries"
    strategy: "priority"
    models:
      - model: "kc/google/gemini-2.0-flash"
      - model: "kc/openai/gpt-4o-mini"
      - model: "kc/mistralai/mistral-7b-instruct"

  # Heavy analysis — maximum reasoning
  heavy_analysis:
    description: "Complex analytical tasks requiring deep reasoning"
    strategy: "priority"
    models:
      - model: "antigravity/claude-opus-4-6-thinking"
      - model: "cl/anthropic/claude-opus-4-20250514"
      - model: "cl/openai/o3"

  # Embedding generation
  embedding:
    description: "Vector embedding generation for memory/retrieval"
    strategy: "priority"
    models:
      - model: "github/text-embedding-3-large"
      - model: "github/text-embedding-3-small"
      - model: "openrouter/openai/text-embedding-3-large"

  # Image generation
  image_gen:
    description: "Image generation for design and prototyping"
    strategy: "priority"
    models:
      - model: "openrouter/openai/gpt-image-1"
      - model: "openrouter/openai/dall-e-3"
      - model: "openrouter/black-forest-labs/FLUX.1-schnell"
      - model: "openrouter/google/imagen-3.0-generate-002"
