content: |
  # 🔍 Deep Research Task Prompt (v1.1)
  
  Ваша задача — провести глубокое исследование темы с использованием нескольких веток поиска, синтеза кода и анализа документации.
  
  ## 🎯 Цель исследования
  {{query}}
  
  ## 🔄 Шаги исследования
  1. **Дивергентный поиск**: Проведите поиск через `web_search` и `context7` для сбора широкого контекста.
  2. **Валидация источников**: Проверьте дату актуальности и репутацию источника.
  3. **Код-майнинг**: Если тема техническая, найдите примеры реализации в репозитории или open-source проектах.
  4. **Синтез**: Сформируйте финальный отчет, выделяя ключевые инсайты и риски.
  
  ## 📤 Формат вывода
  Используйте Markdown с четкой иерархией.
  Каждый инсайт должен сопровождаться ссылкой на источник `(file:///...)` или URL.
